name: Build APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install required SDK platform & build-tools
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"
      - name: Download libv2ray.aar
        uses: robinraju/release-downloader@v1.12
        with:
          repository: '2dust/AndroidLibXrayLite'
          latest: true
          fileName: 'libv2ray.aar'
          out-file-path: VpnConnect/app/libs
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9
      - name: Build debug APK
        working-directory: VpnConnect
        run: gradle assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quattro-vpn-debug-apk
          path: VpnConnect/app/build/outputs/apk/debug/*.apk
